<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Time App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 id="clock"></h1>

  <div class="section">
    <h2>Alarm</h2>

    <input type="time" id="alarmTime">
    <button onclick="addAlarm()">Add Alarm</button>
    <button onclick="clearAllAlarms()">Reset All</button>

    <ul id="alarmList"></ul>

    <button id="stopAlarmBtn" onclick="stopAlarm()" style="display:none; background:red; color:white;">
      STOP ALARM
    </button>
  </div>

  <div class="section">
    <h2>Stopwatch</h2>
    <h3 id="stopwatch">00:00:00</h3>

    <button onclick="startSW()">Start</button>
    <button onclick="stopSW()">Stop</button>
    <button onclick="resetSW()">Reset</button>
    <button onclick="lap()">Lap</button>

    <ul id="laps"></ul>
  </div>

  <div class="section">
    <h2>Timer</h2>

    <input type="number" id="timerInput" placeholder="Seconds">
    <button onclick="startTimer()">Start</button>

    <div class="circle">
      <span id="timerText">0</span>
    </div>
  </div>

  <audio id="alarmSound"
    src="https://cdn.freecodecamp.org/testable-projects-fcc/audio/BeepSound.wav" preload="auto">
  </audio>

  <script src="script.js"></script>
</body>
</html>
